<html>
  <head>
    <meta charset="utf-8" />
    <title>Restablecer contraseña</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f5f0e6;
      color: #4a4a4a;
      margin: 0;
      padding: 0;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="
        max-width: 600px;
        margin: auto;
        background-color: #f9f5f0;
        border: 1px solid #f1e0b3;
        border-radius: 8px;
      "
    >
      <tr>
        <td style="padding: 24px">
          <!-- Encabezado -->
          <h2 style="color: #7a1f3d; margin-top: 0">Restablecer contraseña</h2>

          <p>Hola <strong>{{ username }}</strong>,</p>

          <p>
            Has solicitado restablecer tu contraseña para
            <strong style="color: #c2a15d">CuatroK</strong>.
          </p>

          <!-- Botón -->
          <p style="text-align: center; margin: 32px 0">
            <a
              href="{{ reset_link }}"
              style="
                display: inline-block;
                padding: 14px 28px;
                background-color: #c2a15d;
                color: #ffffff;
                text-decoration: none;
                border-radius: 6px;
                font-weight: bold;
                font-size: 16px;
              "
            >
              Restablecer contraseña
            </a>
          </p>

          <p style="font-size: 14px; color: #4a4a4a">
            Si el botón no funciona, copia y pega este enlace en tu navegador:
          </p>
          <p style="word-break: break-all">
            <a href="{{ reset_link }}" style="color: #7a1f3d"
              >{{ reset_link }}</a
            >
          </p>

          <p style="font-size: 12px; color: #b8954f">
            Este enlace expirará en 1 hora.
          </p>

          <p style="font-size: 14px; color: #4a4a4a">
            Si no solicitaste esto, ignora este correo.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
